version: '3.8'

services:
  shard1:
    build: .
    env_file:
      - config/.env.qa
    environment:
      - CI=true
    volumes:
      - ./reports-shard1:/app/reports/html-report
      - ./allure-shard1:/app/allure-results
      - ./blob-shard1:/app/blob-report
    command: npx playwright test --project=chromium --shard=1/4

  shard2:
