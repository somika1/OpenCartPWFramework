# ═══════════════════════════════════════════════════════════════
# 
# REPO: somika1/OpenCartPWFramework
# DEV REPO: jglick/simple-maven-project-with-tests
# Tests run inside Docker containers
# ═══════════════════════════════════════════════════════════════

name: e2e CI/CD Pipeline (Docker)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Run up to environment'
        required: true
        default: 'QA'
        type: choice
        options:
          - dev
          - QA
          - stage
          - Prod

jobs:

  # ═════════════════════════════════════════════════════
  # STEP 1: BUILD APP + UNIT TESTS (DEV REPO - MAVEN)
  # ═════════════════════════════════════════════════════
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout DEV repo
        uses: actions/checkout@v4
        with:
          repository: jglick/simple-maven-project-with-tests

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build & Run Unit Tests
        run: |
          echo "========================================="
          echo "  Building App + Running Unit Tests"
          echo "========================================="
          mvn clean install -Dmaven.test.failure.ignore=true

      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: target/surefire-reports/
          retention-days: 30

  # ═════════════════════════════════════════════════════
  # STEP 2: BUILD DOCKER IMAGE
  # ═════════════════════════════════════════════════════
  docker-build:
    name: Build Docker Image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4
        with:
          repository: somika1/OpenCartPWFramework

      - name: Build Docker Image
        run: |
          echo "========================================="
          echo "  Building Playwright Docker Image"
          echo "========================================="
          docker build -t pw-framework .

      - name: Save Docker Image
        run: docker save pw-framework -o pw-framework.tar

      - name: Upload Docker Image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: pw-framework.tar
          retention-days: 1

  # ═════════════════════════════════════════════════════
  # STEP 3: DEPLOY DEV + SANITY TESTS
  # ═════════════════════════════════════════════════════
  deploy-dev:
    name: Deploy to DEV
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DEV
        run: echo "Deployed to DEV ✅"

  sanity-dev:
    name: DEV - Sanity Tests (Docker)
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Download Docker Image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: docker load -i pw-framework.tar

      - name: Run Sanity Tests on DEV
        run: |
          echo "========================================="
          echo "  Running SANITY @smoke on DEV (Docker)"
          echo "========================================="
          mkdir -p reports allure-results
          docker run --rm \
            -e CI=true \
            -e ENV=dev \
            -e BASE_URL=${{ secrets.BASE_URL }} \
            -e USERNAME=${{ secrets.USERNAME }} \
            -e PASSWORD=${{ secrets.PASSWORD }} \
            -e API_BASE_URL=${{ secrets.API_BASE_URL }} \
            -e API_AUTH_TOKEN=${{ secrets.API_AUTH_TOKEN }} \
            -e OAUTH_CLIENT_ID=${{ secrets.OAUTH_CLIENT_ID }} \
            -e OAUTH_CLIENT_SECRET=${{ secrets.OAUTH_CLIENT_SECRET }} \
            -e GRANT_TYPE=${{ secrets.GRANT_TYPE }} \
            -v ${{ github.workspace }}/reports:/app/reports \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            pw-framework npx playwright test --project=chromium --grep @smoke

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload DEV HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-sanity-html-report
          path: reports/html-report/
          retention-days: 30

      - name: Upload DEV Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-sanity-allure-report
          path: allure-report/
          retention-days: 30

  # ═════════════════════════════════════════════════════
  # STEP 4: DEPLOY QA + REGRESSION TESTS
  # ═════════════════════════════════════════════════════
  deploy-qa:
    name: Deploy to QA
    needs: sanity-dev
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to QA
        run: echo "Deployed to QA ✅"

  regression-qa:
    name: QA - Regression Tests (Docker)
    needs: deploy-qa
    runs-on: ubuntu-latest
    environment: QA
    steps:
      - name: Download Docker Image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: docker load -i pw-framework.tar

      - name: Run Regression Tests on QA
        run: |
          echo "========================================="
          echo "  Running REGRESSION (all tests) on QA (Docker)"
          echo "========================================="
          mkdir -p reports allure-results
          docker run --rm \
            -e CI=true \
            -e ENV=qa \
            -e BASE_URL=${{ secrets.BASE_URL }} \
            -e USERNAME=${{ secrets.USERNAME }} \
            -e PASSWORD=${{ secrets.PASSWORD }} \
            -e API_BASE_URL=${{ secrets.API_BASE_URL }} \
            -e API_AUTH_TOKEN=${{ secrets.API_AUTH_TOKEN }} \
            -e OAUTH_CLIENT_ID=${{ secrets.OAUTH_CLIENT_ID }} \
            -e OAUTH_CLIENT_SECRET=${{ secrets.OAUTH_CLIENT_SECRET }} \
            -e GRANT_TYPE=${{ secrets.GRANT_TYPE }} \
            -v ${{ github.workspace }}/reports:/app/reports \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            pw-framework npx playwright test --project=chromium

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload QA HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-regression-html-report
          path: reports/html-report/
          retention-days: 30

      - name: Upload QA Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-regression-allure-report
          path: allure-report/
          retention-days: 30

  # ═════════════════════════════════════════════════════
  # STEP 5: DEPLOY STAGE + SANITY TESTS
  # ═════════════════════════════════════════════════════
  deploy-stage:
    name: Deploy to STAGE
    needs: regression-qa
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to STAGE
        run: echo "Deployed to STAGE ✅"

  sanity-stage:
    name: STAGE - Sanity Tests (Docker)
    needs: deploy-stage
    runs-on: ubuntu-latest
    environment: stage
    steps:
      - name: Download Docker Image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: docker load -i pw-framework.tar

      - name: Run Sanity Tests on STAGE
        run: |
          echo "========================================="
          echo "  Running SANITY @smoke on STAGE (Docker)"
          echo "========================================="
          mkdir -p reports allure-results
          docker run --rm \
            -e CI=true \
            -e ENV=stage \
            -e BASE_URL=${{ secrets.BASE_URL }} \
            -e USERNAME=${{ secrets.USERNAME }} \
            -e PASSWORD=${{ secrets.PASSWORD }} \
            -e API_BASE_URL=${{ secrets.API_BASE_URL }} \
            -e API_AUTH_TOKEN=${{ secrets.API_AUTH_TOKEN }} \
            -e OAUTH_CLIENT_ID=${{ secrets.OAUTH_CLIENT_ID }} \
            -e OAUTH_CLIENT_SECRET=${{ secrets.OAUTH_CLIENT_SECRET }} \
            -e GRANT_TYPE=${{ secrets.GRANT_TYPE }} \
            -v ${{ github.workspace }}/reports:/app/reports \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            pw-framework npx playwright test --project=chromium --grep @smoke

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload STAGE HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-sanity-html-report
          path: reports/html-report/
          retention-days: 30

      - name: Upload STAGE Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-sanity-allure-report
          path: allure-report/
          retention-days: 30

  # ═════════════════════════════════════════════════════
  # STEP 6: DEPLOY PROD + SMOKE TESTS
  # ═════════════════════════════════════════════════════
  deploy-prod:
    name: Deploy to PROD
    needs: sanity-stage
    runs-on: ubuntu-latest
    environment: Prod
    steps:
      - name: Deploy to PROD
        run: echo "Deployed to PROD ✅"

  smoke-prod:
    name: PROD - Smoke Tests (Docker)
    needs: deploy-prod
    runs-on: ubuntu-latest
    environment: Prod
    steps:
      - name: Download Docker Image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: docker load -i pw-framework.tar

      - name: Run Smoke Tests on PROD
        run: |
          echo "========================================="
          echo "  Running SMOKE @smoke on PROD (Docker)"
          echo "========================================="
          mkdir -p reports allure-results
          docker run --rm \
            -e CI=true \
            -e ENV=prod \
            -e BASE_URL=${{ secrets.BASE_URL }} \
            -e USERNAME=${{ secrets.USERNAME }} \
            -e PASSWORD=${{ secrets.PASSWORD }} \
            -e API_BASE_URL=${{ secrets.API_BASE_URL }} \
            -e API_AUTH_TOKEN=${{ secrets.API_AUTH_TOKEN }} \
            -e OAUTH_CLIENT_ID=${{ secrets.OAUTH_CLIENT_ID }} \
            -e OAUTH_CLIENT_SECRET=${{ secrets.OAUTH_CLIENT_SECRET }} \
            -e GRANT_TYPE=${{ secrets.GRANT_TYPE }} \
            -v ${{ github.workspace }}/reports:/app/reports \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            pw-framework npx playwright test --project=chromium --grep @smoke

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload PROD HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-html-report
          path: reports/html-report/
          retention-days: 30

      - name: Upload PROD Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-allure-report
          path: allure-report/
          retention-days: 30

  # ═════════════════════════════════════════════════════
  # PIPELINE NOTIFICATION — GITHUB PAGES + EMAIL + SLACK
  # ═════════════════════════════════════════════════════
  notify:
    name: Publish Reports + Notify
    needs: [build, sanity-dev, regression-qa, sanity-stage, smoke-prod]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: write
    steps:
      - name: Set Status Emoji
        id: status
        run: |
          BUILD="${{ needs.build.result }}"
          DEV="${{ needs.sanity-dev.result }}"
          QA="${{ needs.regression-qa.result }}"
          STAGE="${{ needs.sanity-stage.result }}"
          PROD="${{ needs.smoke-prod.result }}"

          get_emoji() { if [ "$1" = "success" ]; then echo "✅"; elif [ "$1" = "skipped" ]; then echo "⏭️"; else echo "❌"; fi; }

          echo "build=$(get_emoji $BUILD)" >> $GITHUB_OUTPUT
          echo "dev=$(get_emoji $DEV)" >> $GITHUB_OUTPUT
          echo "qa=$(get_emoji $QA)" >> $GITHUB_OUTPUT
          echo "stage=$(get_emoji $STAGE)" >> $GITHUB_OUTPUT
          echo "prod=$(get_emoji $PROD)" >> $GITHUB_OUTPUT

          if [ "$BUILD" = "success" ] && [ "$DEV" = "success" ] && [ "$QA" = "success" ] && [ "$STAGE" = "success" ] && [ "$PROD" = "success" ]; then
            echo "overall=✅ ALL PASSED" >> $GITHUB_OUTPUT
          else
            echo "overall=❌ SOME FAILURES" >> $GITHUB_OUTPUT
          fi

       
          REPORT_BASE="https://somika1.github.io/OpenCartPWFramework/runs/${{ github.run_id }}"
          echo "report_url=${REPORT_BASE}" >> $GITHUB_OUTPUT

      - name: Download All Reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Organize Reports for GitHub Pages
        run: |
          mkdir -p pages-deploy/runs/${{ github.run_id }}

          cat > pages-deploy/runs/${{ github.run_id }}/index.html << 'INDEXPAGE'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Pipeline Reports — Run RUN_ID</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 0; padding: 40px; background: #f5f5f5; }
              .container { max-width: 800px; margin: 0 auto; }
              h1 { color: #1a1a2e; }
              .card { background: white; border-radius: 12px; padding: 24px; margin: 16px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
              .card h2 { margin-top: 0; color: #333; }
              .links { display: flex; gap: 12px; flex-wrap: wrap; }
              .btn { display: inline-block; padding: 10px 20px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 14px; }
              .html-btn { background: #1a1a2e; }
              .allure-btn { background: #28a745; }
              .meta { color: #666; font-size: 14px; margin-bottom: 24px; }
              .docker-badge { display: inline-block; background: #2496ED; color: white; padding: 4px 12px; border-radius: 12px; font-size: 12px; margin-left: 8px; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>🎭 Pipeline Reports <span class="docker-badge">🐳 Docker</span></h1>
              <p class="meta">Run ID: RUN_ID | Branch: BRANCH | Date: RUN_DATE</p>

              <div class="card">
                <h2>🟢 DEV — Sanity</h2>
                <div class="links">
                  <a class="btn html-btn" href="dev-html/index.html">📊 HTML Report</a>
                  <a class="btn allure-btn" href="dev-allure/index.html">📈 Allure Report</a>
                </div>
              </div>

              <div class="card">
                <h2>🔵 QA — Regression</h2>
                <div class="links">
                  <a class="btn html-btn" href="qa-html/index.html">📊 HTML Report</a>
                  <a class="btn allure-btn" href="qa-allure/index.html">📈 Allure Report</a>
                </div>
              </div>

              <div class="card">
                <h2>🟡 STAGE — Sanity</h2>
                <div class="links">
                  <a class="btn html-btn" href="stage-html/index.html">📊 HTML Report</a>
                  <a class="btn allure-btn" href="stage-allure/index.html">📈 Allure Report</a>
                </div>
              </div>

              <div class="card">
                <h2>🔴 PROD — Smoke</h2>
                <div class="links">
                  <a class="btn html-btn" href="prod-html/index.html">📊 HTML Report</a>
                  <a class="btn allure-btn" href="prod-allure/index.html">📈 Allure Report</a>
                </div>
              </div>
            </div>
          </body>
          </html>
          INDEXPAGE

          sed -i "s|RUN_ID|${{ github.run_id }}|g" pages-deploy/runs/${{ github.run_id }}/index.html
          sed -i "s|BRANCH|${{ github.ref_name }}|g" pages-deploy/runs/${{ github.run_id }}/index.html
          sed -i "s|RUN_DATE|$(date +'%d %b %Y, %I:%M %p UTC')|g" pages-deploy/runs/${{ github.run_id }}/index.html

          cp -r all-reports/dev-sanity-html-report/ pages-deploy/runs/${{ github.run_id }}/dev-html/ 2>/dev/null || true
          cp -r all-reports/dev-sanity-allure-report/ pages-deploy/runs/${{ github.run_id }}/dev-allure/ 2>/dev/null || true
          cp -r all-reports/qa-regression-html-report/ pages-deploy/runs/${{ github.run_id }}/qa-html/ 2>/dev/null || true
          cp -r all-reports/qa-regression-allure-report/ pages-deploy/runs/${{ github.run_id }}/qa-allure/ 2>/dev/null || true
          cp -r all-reports/stage-sanity-html-report/ pages-deploy/runs/${{ github.run_id }}/stage-html/ 2>/dev/null || true
          cp -r all-reports/stage-sanity-allure-report/ pages-deploy/runs/${{ github.run_id }}/stage-allure/ 2>/dev/null || true
          cp -r all-reports/prod-smoke-html-report/ pages-deploy/runs/${{ github.run_id }}/prod-html/ 2>/dev/null || true
          cp -r all-reports/prod-smoke-allure-report/ pages-deploy/runs/${{ github.run_id }}/prod-allure/ 2>/dev/null || true

          echo "Reports organized ✅"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pages-deploy
          keep_files: true

      - name: Create HTML Dashboard for Email
        run: |
          REPORT_URL="${{ steps.status.outputs.report_url }}"

          cat > dashboard.html << DASHBOARD
          <!DOCTYPE html>
          <html>
          <head>
            <style>
              body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
              .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
              .header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 30px; text-align: center; }
              .header h1 { margin: 0; font-size: 24px; }
              .header p { margin: 8px 0 0; opacity: 0.8; font-size: 14px; }
              .body { padding: 24px; }
              table { width: 100%; border-collapse: collapse; margin: 16px 0; }
              th { background: #f8f9fa; text-align: left; padding: 12px 16px; font-size: 13px; color: #666; text-transform: uppercase; }
              td { padding: 14px 16px; border-bottom: 1px solid #eee; font-size: 14px; }
              .env-name { font-weight: 600; color: #1a1a2e; }
              .test-type { color: #666; font-size: 13px; }
              .status { font-size: 16px; text-align: center; }
              .reports { background: #f8f9fa; padding: 20px 24px; border-top: 1px solid #eee; }
              .reports h3 { margin: 0 0 12px; font-size: 16px; color: #333; }
              .report-link { display: inline-block; padding: 10px 20px; background: #1a1a2e; color: white; text-decoration: none; border-radius: 6px; margin: 4px; font-size: 13px; }
              .report-link.green { background: #28a745; }
              .footer { text-align: center; padding: 16px; color: #999; font-size: 12px; border-top: 1px solid #eee; }
              .meta { display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 13px; color: #666; }
            </style>
          </head>
          <body>
            <div class="container">
              <div class="header">
                <h1>🎭 Playwright CI/CD Dashboard 🐳</h1>
                <p>Master Pipeline Report (Docker)</p>
              </div>
              <div class="body">
                <div class="meta">
                  <span>🔀 Branch: <strong>${{ github.ref_name }}</strong></span>
                  <span>👤 ${{ github.actor }}</span>
                </div>
                <table>
                  <tr><th>Stage</th><th>Test Suite</th><th>Status</th></tr>
                  <tr><td class="env-name">🔨 Build</td><td class="test-type">Maven Unit Tests</td><td class="status">${{ steps.status.outputs.build }}</td></tr>
                  <tr><td class="env-name">🟢 DEV</td><td class="test-type">Sanity (@smoke)</td><td class="status">${{ steps.status.outputs.dev }}</td></tr>
                  <tr><td class="env-name">🔵 QA</td><td class="test-type">Regression (All Tests)</td><td class="status">${{ steps.status.outputs.qa }}</td></tr>
                  <tr><td class="env-name">🟡 STAGE</td><td class="test-type">Sanity (@smoke)</td><td class="status">${{ steps.status.outputs.stage }}</td></tr>
                  <tr><td class="env-name">🔴 PROD</td><td class="test-type">Smoke (@smoke)</td><td class="status">${{ steps.status.outputs.prod }}</td></tr>
                </table>
              </div>
              <div class="reports">
                <h3>📊 View Reports (Click to Open)</h3>
                <a class="report-link" href="${REPORT_URL}/index.html">📁 All Reports Dashboard</a>
                <a class="report-link green" href="${REPORT_URL}/qa-html/index.html">📊 QA HTML Report</a>
                <a class="report-link green" href="${REPORT_URL}/qa-allure/index.html">📈 QA Allure Report</a>
              </div>
              <div class="footer">
                Naveen Automation Labs | Playwright Framework | $(date +'%d %b %Y, %I:%M %p UTC')
              </div>
            </div>
          </body>
          </html>
          DASHBOARD

      - name: Send Email with Dashboard
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.hostinger.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🎭 CI/CD Pipeline (Docker) — ${{ steps.status.outputs.overall }} — ${{ github.ref_name }}"
          to: somi.jain3@gmail.com
          from: "CI Bot <${{ secrets.EMAIL_USERNAME }}>"
          html_body: file://dashboard.html

      - name: Send Slack Notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🎭 Playwright CI/CD Pipeline Report 🐳" }
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "*Overall: ${{ steps.status.outputs.overall }}*\n*Mode:* `Docker Containers`\n*Branch:* `${{ github.ref_name }}`  |  *Triggered by:* `${{ github.actor }}`" }
                },
                { "type": "divider" },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "${{ steps.status.outputs.build }}  *Build* — Maven Unit Tests\n${{ steps.status.outputs.dev }}  *DEV* — Sanity (@smoke)\n${{ steps.status.outputs.qa }}  *QA* — Regression (All Tests)\n${{ steps.status.outputs.stage }}  *STAGE* — Sanity (@smoke)\n${{ steps.status.outputs.prod }}  *PROD* — Smoke (@smoke)" }
                },
                { "type": "divider" },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "📊 View Reports" },
                      "url": "${{ steps.status.outputs.report_url }}/index.html",
                      "style": "primary"
                    },
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "📁 GitHub Actions" },
                      "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Pipeline Summary
        run: |
          echo "═══════════════════════════════════════════"
          echo "  MASTER CI/CD PIPELINE SUMMARY (DOCKER)"
          echo "═══════════════════════════════════════════"
